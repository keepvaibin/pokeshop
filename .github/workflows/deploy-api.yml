name: Build and deploy Python app to Azure Web App - sctcg-api

on:
  push:
    branches:
      - deploy/api
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies into portable folder
        run: |
          # Install into __oryx_packages__ — the directory name Oryx natively recognises.
          # When Oryx finds this directory it automatically exports PYTHONPATH to include it,
          # so manage.py commands work before and after startup.sh runs.
          pip install --target="__oryx_packages__/lib/site-packages" -r requirements.txt

      - name: Pre-collect static files on GitHub
        run: |
          # Point PYTHONPATH to our package folder so Django can run
          export PYTHONPATH=$PYTHONPATH:$(pwd)/__oryx_packages__/lib/site-packages
          # Run collectstatic here (GitHub has write access, Azure won't need to)
          python manage.py collectstatic --noinput
        env:
          # Use dummy values for required env vars during build
          DJANGO_SECRET_KEY: 'build-time-secret-key'
          DJANGO_DEBUG: 'False'

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            __oryx_packages__/
            manage.py
            requirements.txt
            startup.sh
            pokeshop/
            inventory/
            orders/
            users/
            staticfiles/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'sctcg-api'
          slot-name: 'Production'
          package: .
          # Azure should just run the pre-built package, not try to build anything
          # This prevents read-only filesystem errors
