name: Build and deploy Python app to Azure Web App - sctcg-api

on:
  push:
    branches:
      - deploy/api
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Note: We do NOT create a venv here because Python venvs have hardcoded paths.
      # Azure Oryx will detect requirements.txt and build the venv during deployment.
      # This ensures paths are correct for the Azure environment.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.git/
            !.github/
            !.venv/
            !antenv/
            !__pycache__/
            !*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'sctcg-api'
          slot-name: 'Production'
          package: .
        env:
          # Tell Azure to build from source using Oryx
          SCM_DO_BUILD_DURING_DEPLOYMENT: 'true'
          WEBSITE_RUN_FROM_PACKAGE: '0'
