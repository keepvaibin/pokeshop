name: Build and deploy Next.js app to Azure Web App

on:
  push:
    branches:
      - deploy/web
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          # Ship source code only - Azure builds it natively
          path: |
            app/
            public/
            scripts/
            package.json
            package-lock.json
            next.config.ts
            proxy.ts
            middleware.ts
            tsconfig.json
            postcss.config.mjs
            eslint.config.mjs
            !**/__pycache__/
            !**/*.pyc
            !**/node_modules/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop Azure Web App before deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            WEBAPP_ID=$(az webapp list --query "[?name=='sctcg-web'].id | [0]" -o tsv)
            if [ -z "$WEBAPP_ID" ]; then
              echo "Unable to resolve App Service id for sctcg-web"
              exit 1
            fi
            az webapp stop --ids "$WEBAPP_ID"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'sctcg-web'
          slot-name: 'Production'
          package: .

      - name: Start Azure Web App after deploy
        if: always()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            WEBAPP_ID=$(az webapp list --query "[?name=='sctcg-web'].id | [0]" -o tsv)
            if [ -z "$WEBAPP_ID" ]; then
              echo "Unable to resolve App Service id for sctcg-web"
              exit 1
            fi
            az webapp start --ids "$WEBAPP_ID"
