name: Build and deploy Python app to Azure Web App - sctcg-api

on:
  push:
    branches:
      - deploy/api
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect static files
        run: |
          # Temporary venv just to run collectstatic — NOT shipped to Azure.
          python -m venv temp_venv
          source temp_venv/bin/activate
          pip install -r requirements.txt
          python manage.py collectstatic --noinput
        env:
          DJANGO_SECRET_KEY: 'build-time-secret-key'
          DJANGO_DEBUG: 'False'

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # Only ship source code + pre-built staticfiles.
          # NO pip packages — Azure installs them natively via
          # SCM_DO_BUILD_DURING_DEPLOYMENT, avoiding the GLIBC mismatch.
          path: |
            manage.py
            requirements.txt
            startup.sh
            pokeshop/
            inventory/
            orders/
            users/
            staticfiles/
            !**/__pycache__/
            !**/*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'sctcg-api'
          slot-name: 'Production'
          package: .
